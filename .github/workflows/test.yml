name: test

# =============================================================================
# AgentID-Chain — Test Workflow (P16.3)
# =============================================================================
# 跑全套测试：unit + race + coverage + integration
# 触发：push / pull_request
# 上传覆盖率到 Codecov
# =============================================================================

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  GO_VERSION: "1.23"
  COVERAGE_MIN: "70"

jobs:
  unit:
    name: unit + race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run unit tests with race
        run: go test -race -count=1 -timeout 5m ./...

  unit-race-stress:
    name: unit + race + stress (count=3)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Stress test (run 3 times)
        run: go test -race -count=3 -timeout 15m ./...

  unit-coverage:
    name: unit + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run coverage check
        run: ./scripts/check_coverage.sh --min ${{ env.COVERAGE_MIN }}
      - name: Generate coverage profile
        run: go test -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unit
          fail_ci_if_error: false
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  integration:
    name: integration (PG + Redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentid
          POSTGRES_PASSWORD: agentid_test
          POSTGRES_DB: agentid_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AGENTID_STORAGE_DB_DSN: "postgres://agentid:agentid_test@localhost:5432/agentid_test?sslmode=disable"
      AGENTID_STORAGE_REDIS_ADDR: "localhost:6379"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run integration tests
        run: go test -race -tags=integration -count=1 -timeout 10m ./...

  bench:
    name: benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run benchmarks
        run: go test -bench=. -benchmem -run=^$ -benchtime=3s ./... | tee bench.txt
      - name: Upload benchmark result
        uses: actions/upload-artifact@v4
        with:
          name: benchmark
          path: bench.txt
          retention-days: 14

  fuzz:
    name: fuzz (smoke)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Fuzz smoke (10s per target)
        run: |
          FUZZ_TARGETS=$(grep -rE "^func Fuzz[A-Z][A-Za-z0-9_]*" --include="*.go" . | awk '{print $2}' | sed 's/(.*//' | sort -u | head -10)
          for t in $FUZZ_TARGETS; do
            PKG=$(grep -rl "^func $t" --include="*.go" . | head -1 | xargs dirname)
            echo "==> Fuzzing $t in $PKG"
            go test -fuzz="$t" -fuzztime=10s "$PKG" || true
          done
