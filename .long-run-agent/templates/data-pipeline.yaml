name: data-pipeline
description: 数据处理流程模板（v2.0.1 — Postgres/Redis/Outbox 友好）
version: '2.1'
keywords:
  - 数据
  - 采集
  - 清洗
  - 分析
  - ETL
  - pipeline
  - data
  - 处理
  - 转换
  - outbox
  - migration
acceptance:
  - 数据完整性校验通过
  - 幂等可重跑
  - 处理完成
  - 失败回滚策略明确
states:
  - pending
  - running
  - failed
  - success
transitions:
  pending:
    - running
  running:
    - failed
    - success
  failed:
    - running
  success: []
template_engine: jinja2
structure: |
  # {{ id }}

  ## ⚠️ 重要提示（Agent 必读）

  **当前位置**: `.long-run-agent/tasks/{{id}}.md`（任务描述文件）
  **工作目录**: 项目根目录（`.long-run-agent` 的同级目录）
  **产出物位置**: `internal/storage/`、`migrations/`、`scripts/` 或适当位置
  **这是配置文件**，不是最终产出！

  ## 数据源

  {% if data_source %}
  {{ data_source }}
  {% else %}
  <!-- PostgreSQL 表 / Redis Stream / 链上事件 / Outbox -->
  {% endif %}

  ## 处理步骤
  1. <!-- 取数 -->
  2. <!-- 转换 -->
  3. <!-- 写入 / 发布 -->

  ## 输出格式

  <!-- 目标表 / Stream / 文件结构 -->

  ## 幂等性 & 重跑策略

  <!-- 是否支持 idempotency key / 断点续传 / 全量重算 -->

  ## 异常处理 & 回滚

  <!-- 错误分类、DLQ、回滚 SQL / Redis 清理脚本 -->

  ## 验证证据（完成前必填）

  - [ ] **校验脚本**: 列出 row count / hash / 业务约束的检查命令
  - [ ] **样本数据**: 至少 1 条端到端流水（input → output）
  - [ ] **回滚验证**: 模拟失败，确认回滚正确
