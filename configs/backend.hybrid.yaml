# AgentID-Chain backend.yaml — hybrid 模式（链上 + 本地缓存 + 异步同步）
#
# 适用场景：生产中希望保留链上的 trust，同时减少读延迟 + 节省 gas。
# 数据：链上是 source of truth；DB 镜像；Redis 缓存热数据。
# Outbox 异步把本地变更回放到链上。

service:
  name: agentid-chain
  version: 2.0.1
  role: gateway
  http_addr: :8080
  grpc_addr: :8080

log:
  level: info
  format: json
  source: true

backend:
  type: hybrid      # 链上 + 本地混合

storage:
  db:
    driver: postgres
    dsn: postgres://produser:CHANGE_ME@db.prod.example.com:5432/apigateway?sslmode=require
    max_open: 50
    max_idle: 10
    max_lifetime: 1h
  redis:
    addr: redis.prod.example.com:6379
    password: CHANGE_ME
    db: 0
    timeout: 3s
  outbox:
    enabled: true              # 必须开（异步回放链上）
    stream_key: agentid:outbox
    max_len: 1000000
    group_name: agentid-outbox
    block_time: 2s
  audit:
    retention_days: 365
  revocation:
    backend: redis             # 热数据

authz:
  ratelimit:
    enabled: true
    rps: 1000
    burst: 2000
  ua_intercept:
    enabled: true
    blocked_substrings:
      - "bot/"
      - "crawler"
      - "spider"
  aap:
    enabled: true
    challenge_ttl: 30s
  moltcaptcha:
    enabled: true
    challenge_ttl: 60s
    max_attempts: 3
  a2a:
    enabled: true
    default_ttl: 30m          # hybrid 模式 TTL 可以长一点
    max_trust_level: 100
  rbac:
    enabled: true

chain:
  type: polygon
  endpoint: https://polygon-rpc.com
  contract_addr: 0x1234567890ABCDEF1234567890ABCDEF12345678
  gas_limit: 3000000
  signer_key_path: /etc/agentid/keys/chain-signer.pem

aap:
  domain_key_path: /etc/agentid/keys/aap-domain.pem

a2a:
  domain_key_path: /etc/agentid/keys/a2a-domain.pem
  issuer: agentid-chain-prod
  key_id: a2a-prod-2026

moltcaptcha:
  hmac_secret: CHANGE_ME_USE_KMS
  puzzle_difficulty: 4

telemetry:
  otel_endpoint: otel-collector.observability.svc:4317
  metrics_addr: :9090
  pprof_addr: :6060
  sample_rate: 0.05
