{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agentid-chain.fullname" . }}
  labels:
    {{- include "agentid-chain.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "agentid-chain.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # 允许来自 ingress controller 的流量
    - from:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.ingressNamespaceSelector | nindent 12 }}
      ports:
        - port: {{ .Values.service.httpPort }}
          protocol: TCP
    # 允许来自 Prometheus 的 metrics 抓取
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - port: {{ .Values.service.metricsPort }}
          protocol: TCP
  egress:
    # 允许 DNS
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
    # 允许 PG / Redis
    - to:
        - namespaceSelector: {}
      ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
    # 允许 HTTPS 出站（OTel, Chain RPC）
    - ports:
        - port: 443
          protocol: TCP
        - port: 4317
          protocol: TCP
{{- end }}
