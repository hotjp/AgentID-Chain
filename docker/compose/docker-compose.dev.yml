# =============================================================================
# AgentID-Chain — Dev Compose (P1.1 PostgreSQL 16)
# =============================================================================
# 本文件在 P1 阶段逐步累积：
#   P1.1            PostgreSQL 16
#   P1.2            Redis 7
#   P1.3            agentid_net 网络
#   P1.4            命名卷
#   P1.5 [本提交]   init-databases.sql 挂载
#   P1.6            mock-chain 服务
#   P1.7            完整 dev compose
# =============================================================================

networks:
  agentid_net:
    name: agentid_net
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: dev-postgres
    restart: unless-stopped
    networks:
      - agentid_net
    environment:
      POSTGRES_USER: agentid
      POSTGRES_PASSWORD: agentid_dev
      POSTGRES_DB: agentid
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      # P1.5: 初始化建库脚本（仅在 pg_data 空时执行）
      - ../../scripts/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentid -d agentid"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: dev-redis
    restart: unless-stopped
    networks:
      - agentid_net
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  pg_data:
    name: agentid_pg_data
    driver: local
  redis_data:
    name: agentid_redis_data
    driver: local
