# =============================================================================
# AgentID-Chain — Dev Compose (P1.1 PostgreSQL 16)
# =============================================================================
# AgentID-Chain — Dev Compose (v2.0.1)
# =============================================================================
# 包含：基础设施 (postgres/redis) + mock-chain + 网关 (gateway, P5 接入)
#
# 端口速查（与 CLAUDE.md 尾号规则一致）：
#   5432  postgres
#   6379  redis
#   8545  mock-chain (P3.8 实现 EVM JSON-RPC 子集)
#   8080  gateway http/grpc  (P5 接入)
#   9090  gateway metrics    (P5 接入)
#   6060  gateway pprof      (P5 接入)
#   8081  auth-center        (P5 接入)
#   9091  auth-center metrics
#   6061  auth-center pprof
#   8082  tag-sense          (P5 接入)
#   9092  tag-sense metrics
#   6062  tag-sense pprof
#
# 用法：
#   docker compose -f docker/compose/docker-compose.dev.yml up -d
#   docker compose -f docker/compose/docker-compose.dev.yml ps
#   docker compose -f docker/compose/docker-compose.dev.yml down
# =============================================================================

networks:
  agentid_net:
    name: agentid_net
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: dev-postgres
    restart: unless-stopped
    networks:
      - agentid_net
    environment:
      POSTGRES_USER: agentid
      POSTGRES_PASSWORD: agentid_dev
      POSTGRES_DB: agentid
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      # P1.5: 初始化建库脚本（仅在 pg_data 空时执行）
      - ../../scripts/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentid -d agentid"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: dev-redis
    restart: unless-stopped
    networks:
      - agentid_net
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # P1.6: mock-chain 占位服务
  # 当前使用 alpine:3.19 + 内联 Python HTTP server 提供 :8545 端口 + /healthz
  # 待 P3.8 完成后替换为 agentid-chain/mock-chain:v2.0.1（实现真实 EVM JSON-RPC 子集）
  mock-chain:
    image: alpine:3.19
    container_name: dev-mock-chain
    restart: unless-stopped
    networks:
      - agentid_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      AGENTID_CHAIN_RPC_URL: "http://mock-chain:8545"
      AGENTID_CHAIN_DRIVER: "mock"
    command:
      - sh
      - -c
      - |
        apk add --no-cache python3 >/dev/null 2>&1
        exec python3 -u -c "
        from http.server import BaseHTTPRequestHandler, HTTPServer
        class H(BaseHTTPRequestHandler):
            def do_GET(self):
                if self.path == '/healthz':
                    self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                else:
                    self.send_response(200); self.end_headers(); self.wfile.write(b'{\"jsonrpc\":\"2.0\",\"id\":1,\"result\":\"0x0\"}')
            def log_message(self, *a, **k): pass
        HTTPServer(('0.0.0.0', 8545), H).serve_forever()
        "
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8545/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  # P14: 使用真实 gateway 镜像（docker/Dockerfile.gateway）
  gateway:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.gateway
      args:
        VERSION: "dev"
        COMMIT: "local"
        BUILD_DATE: "dev"
    image: agentid-chain/gateway:dev
    container_name: dev-gateway
    profiles: ["with-gateway"]   # 默认不启动；`--profile with-gateway` 启用
    networks:
      - agentid_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-chain:
        condition: service_healthy
    environment:
      AGENTID_SERVICE_NAME: "agentid-chain-gateway"
      AGENTID_SERVICE_ROLE: "gateway"
      AGENTID_STORAGE_DB_DSN: "postgres://agentid:agentid_dev@postgres:5432/agentid?sslmode=disable"
      AGENTID_STORAGE_REDIS_ADDR: "redis:6379"
      AGENTID_BACKEND_TYPE: "local"
      AGENTID_CHAIN_RPC_URL: "http://mock-chain:8545"
      AGENTID_CHAIN_DRIVER: "mock"
      AGENTID_LOG_LEVEL: "debug"
    ports:
      - "8080:8080"  # HTTP / gRPC
      - "9090:9090"  # Prometheus metrics
      - "6060:6060"  # pprof
    command: ["serve", "--config", "/etc/agentid/configs/backend.local.yaml"]
    volumes:
      - ../../configs:/etc/agentid/configs:ro
    healthcheck:
      test: ["CMD", "/usr/local/bin/agentid", "version"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # P5 阶段会替换 image 为 agentid-chain/auth-center:v2.0.1 并启用
  auth-center:
    image: alpine:3.19
    container_name: dev-auth-center-placeholder
    profiles: ["with-gateway"]
    networks:
      - agentid_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      AGENTID_DB_DSN: "postgres://agentid:agentid_dev@postgres:5432/authcenter?sslmode=disable"
      AGENTID_REDIS_ADDR: "redis:6379"
    ports:
      - "8081:8081"
      - "9091:9091"
      - "6061:6061"
    command: ["sh", "-c", "echo 'auth-center placeholder — P5 will replace this image' && sleep infinity"]
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 30s
      timeout: 3s
      retries: 3

  # P5 阶段会替换 image 为 agentid-chain/tag-sense:v2.0.1 并启用
  tag-sense:
    image: alpine:3.19
    container_name: dev-tag-sense-placeholder
    profiles: ["with-gateway"]
    networks:
      - agentid_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      AGENTID_DB_DSN: "postgres://agentid:agentid_dev@postgres:5432/tagsense?sslmode=disable"
      AGENTID_REDIS_ADDR: "redis:6379"
    ports:
      - "8082:8082"
      - "9092:9092"
      - "6062:6062"
    command: ["sh", "-c", "echo 'tag-sense placeholder — P5 will replace this image' && sleep infinity"]
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 30s
      timeout: 3s
      retries: 3

  # P14: CLI 工具（一次性任务，可选 profile 启用）
  cli:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.cli
    image: agentid-chain/cli:dev
    container_name: dev-cli
    profiles: ["with-cli"]
    networks:
      - agentid_net
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AGENTID_SERVICE_NAME: "agentid-chain-cli"
      AGENTID_STORAGE_DB_DSN: "postgres://agentid:agentid_dev@postgres:5432/agentid?sslmode=disable"
    entrypoint: ["/usr/local/bin/agentid"]
    command: ["version"]

  # P14: 数据库迁移（InitContainer 模式，可选 profile 启用）
  migration:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.migration
    image: agentid-chain/migration:dev
    container_name: dev-migration
    profiles: ["migration"]
    networks:
      - agentid_net
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AGENTID_STORAGE_DB_DSN: "postgres://agentid:agentid_dev@postgres:5432/agentid?sslmode=disable"
    command: ["migrate", "up"]
    restart: "no"

volumes:
  pg_data:
    name: agentid_pg_data
    driver: local
  redis_data:
    name: agentid_redis_data
    driver: local
